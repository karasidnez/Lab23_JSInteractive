<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Профиль пользователя</h1>
        <form id="profileForm">
            <div class="form-group">
                <label>Имя:</label>
                <input type="text" id="name" placeholder="Введите имя">
            </div>
            <div class="form-group">
                <label>Возраст:</label>
                <input type="text" id="age" placeholder="Введите возраст">
            </div>
            <div class="form-group">
                <label>Город:</label>
                <input type="text" id="city" placeholder="Введите город">
            </div>
            <div class="form-group">
                <label>Хобби:</label>
                <input type="text" id="hobby" placeholder="Ваше хобби">
            </div>
            <div class="button-group">
                <button type="submit">Сохранить</button>
                <button type="button" id="clearBtn">Очистить</button>
            </div>
        </form>
        <div class="profile-card">
            <h2>Информация</h2>
            <div id="profileInfo">
                <p class="empty">Нет данных. Заполните форму.</p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
